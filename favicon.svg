<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Hisaab Sathi favicon">
  <defs>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1f2d"/>
      <stop offset="100%" stop-color="#0a2a3a"/>
    </linearGradient>
    <linearGradient id="fcoin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9c74f"/>
      <stop offset="100%" stop-color="#f4a11d"/>
    </linearGradient>
    <linearGradient id="faccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#43e8b0"/>
      <stop offset="100%" stop-color="#1ec99a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="15" fill="url(#fbg)"/>

  <!-- Ledger body -->
  <rect x="10" y="12" width="32" height="40" rx="4" fill="#0f2d40"/>
  <!-- Spine -->
  <rect x="10" y="12" width="5" height="40" rx="2.5" fill="url(#faccent)" opacity="0.9"/>

  <!-- Ledger lines -->
  <rect x="19" y="20" width="18" height="3" rx="1.5" fill="#1e4a62"/>
  <rect x="19" y="27" width="14" height="2.5" rx="1.25" fill="#1e4a62" opacity="0.8"/>
  <rect x="19" y="33" width="16" height="2.5" rx="1.25" fill="#1e4a62" opacity="0.7"/>
  <rect x="19" y="39" width="12" height="2.5" rx="1.25" fill="#1e4a62" opacity="0.6"/>

  <!-- Gold coin -->
  <circle cx="44" cy="42" r="13" fill="url(#fcoin)"/>
  <circle cx="44" cy="42" r="10.5" fill="none" stroke="#fde68a" stroke-width="1.2" opacity="0.6"/>
  <text
    x="44" y="46.5"
    text-anchor="middle"
    font-family="'Noto Sans', Arial, sans-serif"
    font-size="11"
    font-weight="800"
    fill="#7c3a00"
  >₹</text>
</svg>
