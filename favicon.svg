<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Hisaab Sathi favicon">
  <defs>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1e2d"/>
      <stop offset="100%" stop-color="#0d2e40"/>
    </linearGradient>
    <linearGradient id="fgold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="50%" stop-color="#f9a825"/>
      <stop offset="100%" stop-color="#e65c00"/>
    </linearGradient>
    <radialGradient id="fshine" cx="38%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#fff9c4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f9a825" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fspine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2de8a8"/>
      <stop offset="100%" stop-color="#00b37a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#fbg)"/>

  <!-- Ledger book -->
  <rect x="8" y="10" width="33" height="42" rx="4" fill="#112d42"/>
  <!-- Spine -->
  <rect x="8" y="10" width="6" height="42" rx="3" fill="url(#fspine)"/>

  <!-- Ledger rows -->
  <circle cx="19" cy="24" r="2.2" fill="#2de8a8"/>
  <rect x="23" y="21.5" width="14" height="5" rx="2.5" fill="#1e4d68"/>

  <circle cx="19" cy="33" r="2.2" fill="#ff6b6b"/>
  <rect x="23" y="30.5" width="11" height="5" rx="2.5" fill="#1e4d68"/>

  <circle cx="19" cy="42" r="2.2" fill="#f9a825"/>
  <rect x="23" y="39.5" width="13" height="5" rx="2.5" fill="#1e4d68"/>

  <!-- Gold coin -->
  <circle cx="46" cy="44" r="14" fill="url(#fgold)"/>
  <circle cx="46" cy="44" r="14" fill="none" stroke="#ffe066" stroke-width="1.2" opacity="0.4"/>
  <circle cx="46" cy="44" r="14" fill="url(#fshine)"/>
  <text x="46" y="49"
    text-anchor="middle"
    font-family="'Noto Sans', Arial, sans-serif"
    font-size="13" font-weight="900"
    fill="#5c2800" opacity="0.9">₹</text>
</svg>
