<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a1f0a">
<meta name="description" content="Hisaab Sathi – Expense tracker, income log, and udhar (credit) ledger">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Hisaab Sathi 💰</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #0a1a0a;
    --surface: #0f240f;
    --surface2: #162e16;
    --border: rgba(34,197,94,0.15);
    --accent: #22c55e;
    --accent2: #4ade80;
    --red: #f87171;
    --orange: #fb923c;
    --text: #f0fff4;
    --muted: #5a8a6a;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
  }
  [data-theme="light"] { --bg: #f0fdf4; --surface: #fff; --surface2: #dcfce7; --text: #052e16; --muted: #16a34a; --border: rgba(34,197,94,0.2); }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .topbar-brand { display: flex; align-items: center; gap: 10px; }
  .topbar-title { font-size: 18px; font-weight: 700; }
  .topbar-sub { font-size: 11px; color: var(--muted); }
  .icon-btn { width: 38px; height: 38px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 80px; }

  /* BALANCE HERO */
  .balance-hero {
    margin: 16px 20px 0;
    background: linear-gradient(135deg, #0f3d0f, #162e16);
    border: 1.5px solid rgba(34,197,94,0.25);
    border-radius: 24px;
    padding: 24px;
    text-align: center;
  }
  .balance-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .balance-amount { font-size: 42px; font-weight: 900; letter-spacing: -1px; }
  .balance-amount.positive { color: var(--accent2); }
  .balance-amount.negative { color: var(--red); }
  .balance-row { display: flex; gap: 20px; justify-content: center; margin-top: 16px; }
  .balance-item { text-align: center; }
  .balance-item-val { font-size: 18px; font-weight: 800; }
  .balance-item-val.inc { color: var(--accent2); }
  .balance-item-val.exp { color: var(--red); }
  .balance-item-key { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ADD ENTRY */
  .type-tabs { display: flex; gap: 8px; padding: 14px 20px 0; }
  .type-tab {
    flex: 1; padding: 10px; border-radius: 14px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--muted); font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: var(--font); transition: all 0.2s; text-align: center;
  }
  .type-tab.active.income { background: rgba(34,197,94,0.2); border-color: var(--accent); color: var(--accent2); }
  .type-tab.active.expense { background: rgba(248,113,113,0.2); border-color: var(--red); color: var(--red); }
  .type-tab.active.udhar-diya { background: rgba(251,146,60,0.2); border-color: var(--orange); color: var(--orange); }
  .type-tab.active.udhar-liya { background: rgba(96,165,250,0.2); border-color: #60a5fa; color: #93c5fd; }

  .add-form { padding: 14px 20px; display: flex; flex-direction: column; gap: 10px; }
  .form-row { display: flex; gap: 10px; }
  .form-input {
    flex: 1; padding: 14px 16px; border-radius: 16px;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 15px; font-family: var(--font); outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); }
  .amount-input {
    padding: 14px 16px; border-radius: 16px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 18px; font-weight: 700;
    font-family: var(--font); outline: none; width: 130px; text-align: right;
    transition: border-color 0.2s;
  }
  .amount-input:focus { border-color: var(--accent); }
  .cat-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .cat-btn {
    padding: 7px 12px; border-radius: 50px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--muted); font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: var(--font); transition: all 0.2s;
  }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #0a1a0a; }
  .add-btn {
    width: 100%; padding: 16px; border-radius: 18px; border: none;
    background: var(--accent); color: #0a1a0a; font-size: 16px; font-weight: 800;
    cursor: pointer; font-family: var(--font); box-shadow: 0 4px 16px rgba(34,197,94,0.3); transition: all 0.2s;
  }
  .add-btn:active { transform: scale(0.97); }

  /* FILTER ROW */
  .filter-row { display: flex; gap: 8px; padding: 12px 20px 4px; overflow-x: auto; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 7px 14px; border-radius: 50px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--muted); font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: var(--font); white-space: nowrap; transition: all 0.2s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0a1a0a; }

  /* ENTRIES */
  .entries-list { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
  .entry-item {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 14px 16px; display: flex; align-items: center; gap: 12px;
  }
  .entry-icon { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .entry-icon.income { background: rgba(34,197,94,0.15); }
  .entry-icon.expense { background: rgba(248,113,113,0.15); }
  .entry-icon.udhar-diya { background: rgba(251,146,60,0.15); }
  .entry-icon.udhar-liya { background: rgba(96,165,250,0.15); }
  .entry-info { flex: 1; min-width: 0; }
  .entry-desc { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .entry-amount { font-size: 16px; font-weight: 800; }
  .entry-amount.income { color: var(--accent2); }
  .entry-amount.expense { color: var(--red); }
  .entry-amount.udhar-diya { color: var(--orange); }
  .entry-amount.udhar-liya { color: #93c5fd; }
  .entry-del { width: 30px; height: 30px; border-radius: 8px; border: 1px solid rgba(248,113,113,0.3); background: rgba(248,113,113,0.1); color: var(--red); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .empty-state { text-align: center; padding: 32px 20px; color: var(--muted); font-size: 14px; line-height: 1.7; }
  .section-header { padding: 16px 20px 6px; font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 20px; border-radius: 12px; cursor: pointer; border: none; background: none; color: var(--muted); font-family: var(--font); transition: all 0.2s; }
  .nav-item.active { color: var(--accent); }
  .nav-item span { font-size: 10px; font-weight: 600; }
  .nav-item svg { width: 22px; height: 22px; }
  .view { display: none; }
  .view.active { display: block; }
</style>
</head>
<body data-theme="dark">

<div class="topbar">
  <div class="topbar-brand">
    <span style="font-size:22px">💰</span>
    <div>
      <div class="topbar-title">Hisaab Sathi</div>
      <div class="topbar-sub">Finance & Udhar Ledger</div>
    </div>
  </div>
  <button class="icon-btn" id="themeBtn">🌙</button>
</div>

<div class="main">

  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <!-- Balance hero -->
    <div class="balance-hero">
      <div class="balance-label">Net Balance</div>
      <div class="balance-amount" id="netBalance">₹0</div>
      <div class="balance-row">
        <div class="balance-item"><div class="balance-item-val inc" id="totalIncome">₹0</div><div class="balance-item-key">Aaya ↑</div></div>
        <div class="balance-item"><div class="balance-item-val exp" id="totalExpense">₹0</div><div class="balance-item-key">Gaya ↓</div></div>
      </div>
    </div>

    <!-- Type tabs -->
    <div class="type-tabs">
      <button class="type-tab active income" data-type="income" onclick="selectType(this)">💚 Aaya</button>
      <button class="type-tab expense" data-type="expense" onclick="selectType(this)">❤️ Gaya</button>
      <button class="type-tab udhar-diya" data-type="udhar-diya" onclick="selectType(this)">🟠 Diya</button>
      <button class="type-tab udhar-liya" data-type="udhar-liya" onclick="selectType(this)">🔵 Liya</button>
    </div>

    <!-- Add form -->
    <div class="add-form">
      <div class="form-row">
        <input class="form-input" id="descInput" type="text" placeholder="Kya ke liye? (e.g. Kirana, Salary...)">
        <input class="amount-input" id="amountInput" type="number" placeholder="₹0" min="1">
      </div>
      <div class="cat-row" id="catRow">
        <!-- populated by JS -->
      </div>
      <div class="form-row">
        <input class="form-input" id="personInput" type="text" placeholder="Kiska naam? (Udhar ke liye)" style="display:none">
        <input class="form-input" id="dateInput" type="date">
      </div>
      <button class="add-btn" onclick="addEntry()">+ Add Hisaab</button>
    </div>

    <!-- Recent entries -->
    <div class="section-header">Recent entries</div>
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all" onclick="filterEntries(this)">All</button>
      <button class="filter-btn" data-filter="income" onclick="filterEntries(this)">💚 Aaya</button>
      <button class="filter-btn" data-filter="expense" onclick="filterEntries(this)">❤️ Gaya</button>
      <button class="filter-btn" data-filter="udhar-diya" onclick="filterEntries(this)">🟠 Diya</button>
      <button class="filter-btn" data-filter="udhar-liya" onclick="filterEntries(this)">🔵 Liya</button>
    </div>
    <div style="height:10px"></div>
    <div class="entries-list" id="entriesList">
      <div class="empty-state">💰<br>Koi hisaab nahi abhi.<br>Pehla entry add karo!</div>
    </div>
  </div>

  <!-- UDHAR VIEW -->
  <div class="view" id="view-udhar">
    <div class="section-header">Udhar Diya (Teri tarf se)</div>
    <div class="entries-list" id="udharDiyaList"><div class="empty-state">Koi udhar nahi diya.</div></div>
    <div class="section-header">Udhar Liya (Dusron se)</div>
    <div class="entries-list" id="udharLiyaList"><div class="empty-state">Koi udhar nahi liya.</div></div>
    <div style="margin:16px 20px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:14px;color:var(--muted)">Log tujhe denge</span>
        <span style="font-size:16px;font-weight:800;color:var(--accent2)" id="udharReceivable">₹0</span>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span style="font-size:14px;color:var(--muted)">Tu dega</span>
        <span style="font-size:16px;font-weight:800;color:var(--red)" id="udharPayable">₹0</span>
      </div>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-item active" data-view="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Hisaab</span>
  </button>
  <button class="nav-item" data-view="udhar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
    <span>Udhar</span>
  </button>
</nav>

<script>
const STORAGE_KEY = 'hisaab-v3';
const CATS = {
  income: ['💼 Salary','🏠 Rent In','🎁 Gift','💹 Investment','🛒 Business','📦 Other'],
  expense: ['🛒 Kirana','🍕 Khana','🚗 Transport','💊 Health','🎮 Entertainment','📱 Mobile','💡 Bill','👗 Kapde','📚 Padhai','📦 Other'],
  'udhar-diya': ['👨 Dost','👩 Relative','🏢 Work','📦 Other'],
  'udhar-liya': ['👨 Dost','👩 Relative','🏢 Work','📦 Other'],
};
const ICONS = { income:'💚', expense:'❤️', 'udhar-diya':'🟠', 'udhar-liya':'🔵' };
const TYPE_LABEL = { income:'Aaya', expense:'Gaya', 'udhar-diya':'Udhar Diya', 'udhar-liya':'Udhar Liya' };

let data = load();
let selectedType = 'income';
let selectedCat = '';
let currentFilter = 'all';

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"entries":[]}'); }
  catch { return { entries: [] }; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function selectType(btn) {
  document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedType = btn.dataset.type;
  selectedCat = '';
  renderCats();
  const personInput = document.getElementById('personInput');
  personInput.style.display = (selectedType === 'udhar-diya' || selectedType === 'udhar-liya') ? 'flex' : 'none';
}

function renderCats() {
  const row = document.getElementById('catRow');
  row.innerHTML = (CATS[selectedType] || []).map(c => `
    <button class="cat-btn ${selectedCat === c ? 'active' : ''}" onclick="selectCat(this,'${c}')">${c}</button>
  `).join('');
}

function selectCat(btn, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedCat = cat;
}

function addEntry() {
  const desc = document.getElementById('descInput').value.trim();
  const amount = parseFloat(document.getElementById('amountInput').value);
  const person = document.getElementById('personInput').value.trim();
  const date = document.getElementById('dateInput').value || new Date().toISOString().split('T')[0];

  if (!desc && !selectedCat) { alert('Description ya category select karo!'); return; }
  if (!amount || amount <= 0) { alert('Amount dalo!'); return; }

  data.entries.unshift({
    id: Date.now(), type: selectedType,
    desc: desc || selectedCat || TYPE_LABEL[selectedType],
    cat: selectedCat,
    amount,
    person,
    date,
    dateStr: new Date(date).toLocaleDateString('hi-IN', { dateStyle: 'medium' }),
  });

  save();
  document.getElementById('descInput').value = '';
  document.getElementById('amountInput').value = '';
  document.getElementById('personInput').value = '';
  selectedCat = '';
  renderCats();
  updateUI();
}

function filterEntries(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  renderEntries();
}

function updateUI() {
  const inc = data.entries.filter(e => e.type === 'income').reduce((a, e) => a + e.amount, 0);
  const exp = data.entries.filter(e => e.type === 'expense').reduce((a, e) => a + e.amount, 0);
  const net = inc - exp;
  const bal = document.getElementById('netBalance');
  bal.textContent = '₹' + Math.abs(net).toLocaleString('hi-IN');
  bal.className = 'balance-amount ' + (net >= 0 ? 'positive' : 'negative');
  if (net < 0) bal.textContent = '-₹' + Math.abs(net).toLocaleString('hi-IN');
  document.getElementById('totalIncome').textContent = '₹' + inc.toLocaleString('hi-IN');
  document.getElementById('totalExpense').textContent = '₹' + exp.toLocaleString('hi-IN');

  const udharD = data.entries.filter(e => e.type === 'udhar-diya').reduce((a, e) => a + e.amount, 0);
  const udharL = data.entries.filter(e => e.type === 'udhar-liya').reduce((a, e) => a + e.amount, 0);
  document.getElementById('udharReceivable').textContent = '₹' + udharD.toLocaleString('hi-IN');
  document.getElementById('udharPayable').textContent = '₹' + udharL.toLocaleString('hi-IN');

  renderEntries();
  renderUdhar();
}

function renderEntries() {
  const el = document.getElementById('entriesList');
  const filtered = currentFilter === 'all' ? data.entries : data.entries.filter(e => e.type === currentFilter);
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state">💰<br>Koi entry nahi mili.</div>';
    return;
  }
  el.innerHTML = filtered.slice(0, 30).map(e => `
    <div class="entry-item">
      <div class="entry-icon ${e.type}">${ICONS[e.type]}</div>
      <div class="entry-info">
        <div class="entry-desc">${e.desc}${e.person ? ` (${e.person})` : ''}</div>
        <div class="entry-meta">${e.cat || TYPE_LABEL[e.type]} • ${e.dateStr}</div>
      </div>
      <span class="entry-amount ${e.type}">${e.type === 'income' ? '+' : '-'}₹${e.amount.toLocaleString('hi-IN')}</span>
      <button class="entry-del" onclick="deleteEntry(${e.id})">✕</button>
    </div>
  `).join('');
}

function renderUdhar() {
  const diya = data.entries.filter(e => e.type === 'udhar-diya');
  const liya = data.entries.filter(e => e.type === 'udhar-liya');
  const render = (entries, elId) => {
    const el = document.getElementById(elId);
    if (!entries.length) { el.innerHTML = '<div class="empty-state" style="padding:16px">Koi udhar nahi.</div>'; return; }
    el.innerHTML = entries.map(e => `
      <div class="entry-item">
        <div class="entry-icon ${e.type}">${ICONS[e.type]}</div>
        <div class="entry-info">
          <div class="entry-desc">${e.person || 'Unknown'}</div>
          <div class="entry-meta">${e.desc} • ${e.dateStr}</div>
        </div>
        <span class="entry-amount ${e.type}">₹${e.amount.toLocaleString('hi-IN')}</span>
        <button class="entry-del" onclick="deleteEntry(${e.id})">✕</button>
      </div>
    `).join('');
  };
  render(diya, 'udharDiyaList');
  render(liya, 'udharLiyaList');
}

function deleteEntry(id) {
  data.entries = data.entries.filter(e => e.id !== id);
  save(); updateUI();
}

// Init
document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
renderCats();
updateUI();

// NAV
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    item.classList.add('active');
    document.getElementById('view-' + item.dataset.view).classList.add('active');
  });
});

// THEME
const savedTheme = localStorage.getItem('hisaab-theme') || 'dark';
document.body.dataset.theme = savedTheme;
document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '🌙' : '☀️';
document.getElementById('themeBtn').addEventListener('click', () => {
  const t = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
  document.body.dataset.theme = t;
  document.getElementById('themeBtn').textContent = t === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('hisaab-theme', t);
});
</script>
</body>
</html>
